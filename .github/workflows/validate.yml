name: Lint

on:
  push:
    branches: [main, devel]
  pull_request:
    branches: [main, devel]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Set up Bun
        uses: oven-sh/setup-bun@v2 
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install
      - name: Type check
        run: bun run type-check
      - name: Lint
        run: bun lint
      - name: Check formatting
        run: bun format

